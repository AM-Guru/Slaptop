<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">Slap/Top app icon — Laptop</title>
  <desc id="description">The laptop layer from the Slap/Top macOS app icon, aligned on a transparent 1024 by 1024 canvas.</desc>
  <defs>
    <linearGradient id="background" x1="144" y1="112" x2="880" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#20231d"/>
