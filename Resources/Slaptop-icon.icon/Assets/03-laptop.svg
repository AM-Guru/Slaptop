      <stop offset="1" stop-color="#050604"/>
    </linearGradient>
    <linearGradient id="screen" x1="270" y1="284" x2="770" y2="692" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6542df"/>
      <stop offset="0.5" stop-color="#2b1769"/>
      <stop offset="1" stop-color="#100a24"/>
    </linearGradient>
    <linearGradient id="screenSheen" x1="304" y1="330" x2="738" y2="614" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.22"/>
