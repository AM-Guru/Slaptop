<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">Slap/Top app icon — Brand slash</title>
  <desc id="description">The brand slash layer from the Slap/Top macOS app icon, aligned on a transparent 1024 by 1024 canvas.</desc>
  <defs>
