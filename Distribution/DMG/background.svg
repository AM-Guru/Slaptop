<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400" role="img" aria-labelledby="title description">
  <title id="title">Slaptop disk image installation background</title>
  <desc id="description">A dark branded background instructing the user to drag Slaptop to the Applications folder.</desc>
  <defs>
    <linearGradient id="background" x1="30" y1="20" x2="630" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20231d"/>
      <stop offset="0.48" stop-color="#0b0d09"/>
      <stop offset="1" stop-color="#100a24"/>
    </linearGradient>
    <radialGradient id="violetHalo" cx="50%" cy="50%" r="50%">
      <stop stop-color="#8d68ff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#8d68ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="limeHalo" cx="50%" cy="50%" r="50%">
      <stop stop-color="#c8ff2f" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c8ff2f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="254" y1="210" x2="408" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8d68ff"/>
      <stop offset="1" stop-color="#c8ff2f"/>
    </linearGradient>
    <linearGradient id="slash" x1="35" y1="27" x2="18" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0ff78"/>
      <stop offset="1" stop-color="#8ab800"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#f1efe8" stroke-opacity="0.026"/>
    </pattern>
    <filter id="arrowGlow" x="-30%" y="-100%" width="160%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="660" height="400" fill="url(#background)"/>
  <rect width="660" height="400" fill="url(#grid)"/>
  <circle cx="170" cy="210" r="132" fill="url(#violetHalo)"/>
  <circle cx="490" cy="210" r="132" fill="url(#limeHalo)"/>
  <path d="M0 122H660" stroke="#f1efe8" stroke-opacity="0.08"/>

  <g aria-label="Slaptop brand mark">
    <rect x="20" y="20" width="48" height="48" rx="13" fill="#0b0d09" stroke="#f1efe8" stroke-opacity="0.14"/>
    <path d="M42 27H50L30 60H22Z" fill="url(#slash)"/>
    <path d="M50 29a14 14 0 0 1 0 28M55 24a21 21 0 0 1 0 38" fill="none" stroke="#8d68ff" stroke-linecap="round" stroke-opacity="0.58" stroke-width="2"/>
  </g>

  <text x="84" y="40" fill="#f1efe8" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="21" font-weight="700">Install Slaptop</text>
  <text x="84" y="64" fill="#f1efe8" fill-opacity="0.62" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13">Drag Slaptop to the Applications folder</text>

  <g fill="none" stroke="url(#arrow)" stroke-linecap="round" stroke-linejoin="round" filter="url(#arrowGlow)">
    <path d="M254 210H401" stroke-width="5"/>
    <path d="M386 195l16 15-16 15" stroke-width="5"/>
  </g>
  <path d="M270 229c34 17 86 17 120 0" fill="none" stroke="#f1efe8" stroke-dasharray="2 7" stroke-linecap="round" stroke-opacity="0.17" stroke-width="2"/>

  <g transform="translate(95 326)">
    <rect width="470" height="46" rx="15" fill="#f1efe8" fill-opacity="0.055" stroke="#f1efe8" stroke-opacity="0.09"/>
    <circle cx="25" cy="23" r="10" fill="#c8ff2f" fill-opacity="0.12"/>
    <path d="M21 23l3 3 6-7" fill="none" stroke="#c8ff2f" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
    <text x="44" y="20" fill="#f1efe8" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="600">Then open Slaptop from Applications</text>
    <text x="44" y="36" fill="#f1efe8" fill-opacity="0.52" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="10.5">This lets macOS register the motion sensor helper.</text>
  </g>
</svg>
